<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hungarian Climbing Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    #map { height: 100vh; width: 100%; }

    .sidebar {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 1000;
      background: white;
      padding: 18px 20px;
      border-radius: 10px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.18);
      min-width: 220px;
      font-size: 14px;
    }

    .sidebar h2 {
      font-size: 18px;
      margin-bottom: 12px;
      color: #222;
    }

    .sidebar input[type="text"] {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 12px;
      outline: none;
    }

    .sidebar input[type="text"]:focus {
      border-color: #3388ff;
    }

    .filter-group { margin-bottom: 6px; }

    .filter-group label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      padding: 4px 0;
      font-size: 13px;
    }

    .filter-group input[type="checkbox"] {
      width: 16px;
      height: 16px;
      cursor: pointer;
    }

    .color-dot {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .legend {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #eee;
      font-size: 11px;
      color: #555;
    }

    .leaflet-popup-content {
      font-size: 13px;
      line-height: 1.5;
    }
    .leaflet-popup-content h3 {
      margin-bottom: 4px;
      font-size: 15px;
    }
    .leaflet-popup-content .type-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      color: white;
      margin-bottom: 6px;
    }
    .leaflet-popup-content a {
      display: inline-block;
      margin-top: 4px;
      color: #3388ff;
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <h2>Hungarian Climbing Map</h2>
    <input type="text" id="search" placeholder="Search locations..." />
    <div class="filter-group">
      <label><input type="checkbox" class="filter-cb" data-type="via-ferrata" checked /><span class="color-dot" style="background:#e74c3c"></span> Via Ferrata</label>
      <label><input type="checkbox" class="filter-cb" data-type="gym" checked /><span class="color-dot" style="background:#3498db"></span> Climbing Gyms</label>
      <label><input type="checkbox" class="filter-cb" data-type="boulder" checked /><span class="color-dot" style="background:#2ecc71"></span> Outdoor Boulders</label>
      <label><input type="checkbox" class="filter-cb" data-type="wall" checked /><span class="color-dot" style="background:#e67e22"></span> Outdoor Walls</label>
    </div>
    <div class="legend"><strong>Total:</strong> <span id="total-count">0</span> locations shown</div>
  </div>
  <div id="map"></div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
