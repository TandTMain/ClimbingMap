<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hungarian Climbing Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    #map { height: 100vh; width: 100%; }

    .sidebar {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 1000;
      background: white;
      padding: 16px 18px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      min-width: 220px;
      font-size: 14px;
      max-height: calc(100vh - 32px);
      overflow-y: auto;
    }

    .sidebar h2 {
      font-size: 17px;
      margin-bottom: 12px;
      color: #1a1a1a;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .sidebar input[type="search"] {
      width: 100%;
      padding: 8px 12px;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 12px;
      outline: none;
      transition: border-color 0.15s;
      background: #fafafa;
    }

    .sidebar input[type="search"]:focus {
      border-color: #3388ff;
      background: white;
    }

    .filter-group { margin-bottom: 4px; }

    .filter-group label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      padding: 5px 0;
      font-size: 13px;
      color: #333;
      transition: opacity 0.1s;
    }

    .filter-group label:hover {
      opacity: 0.8;
    }

    .filter-group input[type="checkbox"] {
      width: 16px;
      height: 16px;
      cursor: pointer;
      accent-color: #555;
    }

    .color-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
      border: 1.5px solid rgba(0,0,0,0.1);
    }

    .legend {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #eee;
      font-size: 12px;
      color: #555;
      font-weight: 500;
    }

    .leaflet-popup-content {
      font-size: 13px;
      line-height: 1.5;
      min-width: 200px;
    }
    .leaflet-popup-content h3 {
      margin-bottom: 6px;
      font-size: 16px;
      font-weight: 700;
      color: #1a1a1a;
    }
    .popup-badges {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }
    .leaflet-popup-content .type-badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      color: white;
      letter-spacing: 0.3px;
    }
    .diff-badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 700;
      color: #555;
      background: #f0f0f0;
      border: 1px solid #ddd;
      letter-spacing: 0.3px;
    }
    .popup-desc {
      margin-bottom: 8px;
      color: #444;
      font-size: 12.5px;
    }
    .popup-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .popup-footer small {
      color: #888;
      font-size: 11px;
    }
    .popup-link {
      color: #3388ff;
      font-size: 12px;
      font-weight: 600;
      text-decoration: none;
      white-space: nowrap;
    }
    .popup-link:hover {
      text-decoration: underline;
    }
    .popup-img {
      width: 100%;
      max-height: 160px;
      object-fit: cover;
      border-radius: 8px;
      margin-bottom: 10px;
      display: block;
    }
    .popup-weather {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #eee;
      font-size: 12px;
      line-height: 1.6;
    }
    .popup-weather-icon {
      font-size: 18px;
      margin-right: 4px;
    }
    .popup-weather-temp {
      font-weight: 700;
      font-size: 14px;
      color: #333;
    }
    .popup-weather-detail {
      color: #777;
      font-size: 11.5px;
    }

    .weather {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #eee;
      font-size: 11.5px;
      color: #555;
    }
    .weather-header {
      font-weight: 600;
      margin-bottom: 5px;
      font-size: 12px;
      color: #333;
    }
    #weather-info {
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <h2>Hungarian Climbing Map</h2>
    <input type="search" id="search" placeholder="Search locations..." />
    <div class="filter-group"></div>
    <div class="legend"><strong>Total:</strong> <span id="total-count">Loading...</span></div>
    <div class="weather">
      <div class="weather-header">Weather at map center</div>
      <div id="weather-info">Loading...</div>
    </div>
  </div>
  <div id="map"></div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
